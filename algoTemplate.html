<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Template</title>
    <style>
        /* Main body styling */
        body {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            color: #676a81;
            background-color: #fff;
        }

        .header {
            text-align: center;
            margin: 50px 0;
        }

        .header h1 {
            font-size: 36px;
            color: #43485c;
        }

        .toggle-section {
            margin: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .toggle-title {
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #40E0D0;
            color: #fff;
            border-radius: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .toggle-title:hover {
            background-color: #9f00ff;
        }

        .toggle-content {
            display: none;
            margin-top: 10px;
            text-align: center;
            width: 100%; /* Ensure it looks good on different screens */
        }

        iframe {
            width: 100%;
            max-width: 900px;
            height: 600px;
            border: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .back-button {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .back-button a {
            text-transform: capitalize;
            font-size: 18px;
            color: #fff;
            background-color: #40E0D0;
            padding: 10px 20px;
            border-radius: 3px;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(0,0,0,.2);
            transition: background 0.3s ease-in-out;
        }

        .back-button a:hover {
            background-color: #9f00ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Algorithm Template</h1>
    </div>

    <!-- Intro Section -->
    <div class="toggle-section">
        <div class="toggle-title" onclick="toggleContent('intro-content')">Intro</div>
        <div id="intro-content" class="toggle-content">
            <iframe src="algoTemplate/intro.html"></iframe>
        </div>
    </div>

    <!-- CS Algorithm Section -->
    <div class="toggle-section">
        <div class="toggle-title" onclick="toggleContent('cs-content')">CS Algorithm Template</div>
        <div id="cs-content" class="toggle-content">
            <iframe src="algoTemplate/cs algoT.html"></iframe>
        </div>
    </div>

    <!-- ML Algorithm Section -->
    <div class="toggle-section">
        <div class="toggle-title" onclick="toggleContent('ml-content')">ML Algorithm Template</div>
        <div id="ml-content" class="toggle-content">
            <iframe src="algoTemplate/ml algoT.html"></iframe>
        </div>
    </div>

    <!-- Back to Portfolio Button -->
    <div class="back-button">
        <a href="index.html#portfolio">Back to Portfolio</a>
    </div>

    <script>
        function toggleContent(id) {
            var content = document.getElementById(id);
            if (content.style.display === "none" || content.style.display === "") {
                content.style.display = "block";
            } else {
                content.style.display = "none";
            }
        }
    </script>
</body>
</html>
