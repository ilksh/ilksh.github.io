<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Representation with Mermaid</title>
    <!-- Include the Mermaid library -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true });
    </script>
</head>
<body>
    <h3>Graph</h3>
    <div class="mermaid">
        graph TD;
        a---|29|b;
        a---|10|f;
        b---|16|c;
        b---|15|g;
        c---|12|d;
        d---|22|e;
        e---|25|g;
        f---|27|e;
        g---|18|d;
    </div>
</body>
</html>
